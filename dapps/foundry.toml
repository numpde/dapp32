[profile.default]
solc = "0.8.35"
evm_version = "prague"
src = "."
test = "."
out = "out"
cache_path = "cache"
libs = ["dependencies"]
optimizer = true
optimizer_runs = 200
via_ir = false

[profile.ci]
verbosity = 3

[profile.ci.fuzz]
runs = 10000

[profile.ci.invariant]
runs = 1000
depth = 64

[fuzz]
runs = 256

[invariant]
runs = 64
depth = 32

[dependencies]
"@openzeppelin-contracts" = { version = "5.6.1" }
forge-std = { version = "1.12.0" }

[soldeer]
remappings_generate = true
remappings_regenerate = true
remappings_version = true
remappings_prefix = ""
remappings_location = "txt"
