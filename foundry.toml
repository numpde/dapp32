[profile.default]
solc = "0.8.35"
evm_version = "prague"
src = "contracts/src"
test = "contracts/test"
out = "contracts/out"
cache_path = "contracts/cache"
libs = ["contracts/lib"]
optimizer = true
optimizer_runs = 200
via_ir = false

[profile.ci]
verbosity = 3

[profile.ci.fuzz]
runs = 10000

[profile.ci.invariant]
runs = 1000
depth = 64

[fuzz]
runs = 256

[invariant]
runs = 64
depth = 32
