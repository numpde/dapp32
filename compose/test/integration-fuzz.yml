# Generic CAM integration-fuzz runner.
#
# This service runs the dapp-independent CAM random-walk/conformance runner
# against an already-deployed CAM host. The caller supplies a descriptor file
# and the Docker network where the descriptor's rpcUrl/resourceOrigin are
# reachable. Dapp-specific deployment remains outside this file.

services:
  test-integration-fuzz-check:
    extends:
      file: ../fragments/node-workspace.yml
      service: offline-node-workspace
    working_dir: /work
    volumes:
      - ../../js:/input/js:ro
      - ../../js/node_modules:/work/js/node_modules:ro
    command:
      - "run-js-workspace"
      - "sh"
      - "-eu"
      - "-c"
      - |
        npm run build:workspace
        ./node_modules/.bin/tsc -p tools/cam-integration-fuzz/tsconfig.json
        node --test --experimental-strip-types tools/cam-integration-fuzz/*.test.ts

  test-integration-fuzz:
    extends:
      file: ../fragments/node-workspace.yml
      service: hardened-node-workspace
    working_dir: /work
    environment:
      CAM_INTEGRATION_DESCRIPTOR_PATH: /tmp/cam-integration.json
      CAM_INTEGRATION_SEED: "${CAM_INTEGRATION_SEED:?missing_CAM_INTEGRATION_SEED}"
      CAM_INTEGRATION_RUNS: "${CAM_INTEGRATION_RUNS:?missing_CAM_INTEGRATION_RUNS}"
      CAM_INTEGRATION_STEPS: "${CAM_INTEGRATION_STEPS:?missing_CAM_INTEGRATION_STEPS}"
      CAM_INTEGRATION_WRITE_MODE: simulate
    volumes:
      - ../../js:/input/js:ro
      - ../../js/node_modules:/work/js/node_modules:ro
      - "${CAM_INTEGRATION_DESCRIPTOR_HOST_PATH:?missing_CAM_INTEGRATION_DESCRIPTOR_HOST_PATH}:/tmp/cam-integration.json:ro"
    networks:
      - cam_integration
    command:
      - "run-js-workspace"
      - "sh"
      - "-eu"
      - "-c"
      - |
        npm run build:workspace
        ./node_modules/.bin/tsc -p tools/cam-integration-fuzz/tsconfig.json
        node --experimental-strip-types tools/cam-integration-fuzz/runner.ts

networks:
  cam_integration:
    name: "${CAM_INTEGRATION_NETWORK:?missing_CAM_INTEGRATION_NETWORK}"
    external: true
