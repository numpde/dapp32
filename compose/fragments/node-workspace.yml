# Shared offline Node workspace posture.
#
# Compose anchors cannot cross files. `extends` gives package-backed lanes a
# real construction boundary for the common container posture while each lane
# still owns its mounts, networks, commands, and domain-specific environment.
services:
  hardened-node-workspace:
    build:
      context: ../../containers/node-deps
      dockerfile: Dockerfile
    user: "${LOCAL_UID:?missing_LOCAL_UID}:${LOCAL_GID:?missing_LOCAL_GID}"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 384
    mem_limit: 1g
    environment:
      HOME: /tmp/home
      npm_config_cache: /tmp/npm-cache
      npm_config_audit: "false"
      npm_config_fund: "false"
      npm_config_update_notifier: "false"
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=512m
      - /work/js:rw,exec,nosuid,nodev,size=512m,uid=${LOCAL_UID:?missing_LOCAL_UID},gid=${LOCAL_GID:?missing_LOCAL_GID},mode=1777

  offline-node-workspace:
    extends:
      service: hardened-node-workspace
    network_mode: "none"
