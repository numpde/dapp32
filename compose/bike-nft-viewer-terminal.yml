# Local bike NFT viewer terminal scenario.
#
# Compose this file with compose/bike-nft-local.yml. The base scenario starts a
# private Anvil and deploys the bike NFT fixture. This overlay shares Forge's
# standard broadcast artifact through a scenario-local Docker volume with a Node
# terminal that connects to the same internal Docker network. No host RPC port
# is published, and `make bike-nft-viewer-terminal-down` removes the volume.

services:
  deploy-bike-nft-local:
    environment:
      FOUNDRY_BROADCAST: /out/foundry-broadcast
    volumes:
      - bike_nft_runtime:/out

  bike-nft-viewer-terminal:
    build:
      context: ../containers/node-deps
      dockerfile: Dockerfile
    working_dir: /work
    depends_on:
      deploy-bike-nft-local:
        condition: service_completed_successfully
    user: "${LOCAL_UID:?missing_LOCAL_UID}:${LOCAL_GID:?missing_LOCAL_GID}"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 384
    mem_limit: 1g
    environment:
      HOME: /tmp/home
      npm_config_cache: /tmp/npm-cache
      npm_config_audit: "false"
      npm_config_fund: "false"
      npm_config_update_notifier: "false"
      CAM_VIEWER_BACKEND: local-rpc
      CAM_VIEWER_RPC_URL: http://bike-nft-anvil:8545
      CAM_VIEWER_BROADCAST_PATH: /out/foundry-broadcast/DeployBikeNftLocal.s.sol/31337/run-latest.json
      CAM_VIEWER_FILE_ROOT: /work/dapps/bike-nft/cam
      CAM_VIEWER_INITIAL_PARAMS_JSON: "{}"
      CAM_VIEWER_INITIAL_STATE_JSON: '{"serialNumber":""}'
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=256m
      - /work/packages:rw,exec,nosuid,nodev,size=512m,uid=${LOCAL_UID:?missing_LOCAL_UID},gid=${LOCAL_GID:?missing_LOCAL_GID},mode=1777
    volumes:
      - ../dapps:/work/dapps:ro
      - ../packages:/input/packages:ro
      - ../packages/node_modules:/work/packages/node_modules:ro
      - ../tools:/work/tools:ro
      - bike_nft_runtime:/out:ro
    networks:
      - bike_nft_local
    stdin_open: true
    tty: true
    command:
      - "run-package-workspace"
      - "sh"
      - "-eu"
      - "-c"
      - |
        npm run build:packages
        cd /work
        node --experimental-strip-types tools/viewer-terminal/terminal-session.ts

volumes:
  bike_nft_runtime:
