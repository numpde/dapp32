# Routine Solidity/Foundry check lanes.
#
# These services share one deliberately constrained posture:
# - no network access
# - read-only repository mount
# - read-only container filesystem
# - non-root host UID/GID
# - no Linux capabilities
# - bounded memory/PID usage
# - temporary cache/artifact paths
#
# Keep ordinary source checks here. Split a service into another compose file
# only when it needs a different trust boundary, such as RPC, browser access,
# a writable mount, or a published port.
x-offline-hardened: &offline_hardened
  working_dir: /work/dapps
  user: "${LOCAL_UID:?missing_LOCAL_UID}:${LOCAL_GID:?missing_LOCAL_GID}"
  read_only: true
  network_mode: "none"
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  pids_limit: 256
  mem_limit: 1g
  environment:
    HOME: /tmp/home
    XDG_DATA_HOME: /usr/local/share
    FOUNDRY_CACHE_PATH: /tmp/foundry-cache
    FOUNDRY_CONFIG: /work/dapps/foundry.toml
    FOUNDRY_OUT: /tmp/foundry-out
    FOUNDRY_BROADCAST: /tmp/foundry-broadcast
  tmpfs:
    - /tmp:rw,nosuid,nodev,noexec,size=512m

x-forge-base: &forge_base
  <<: *offline_hardened
  # All Forge check services use the repo-owned Foundry image definition in
  # containers/foundry/Dockerfile. Compose owns runtime confinement above.
  build:
    context: ../containers/foundry
    dockerfile: Dockerfile
  volumes:
    - ..:/work:ro

services:
  # Formatting is a read-only source check. Deployment scripts are source too;
  # they are included here even though execution gets its own scenario lane.
  forge-fmt:
    <<: *forge_base
    command:
      - "sh"
      - "-eu"
      - "-c"
      - |
        set --
        for dir in */src */test */script; do
          if [ -d "$$dir" ]; then
            set -- "$$@" "$$dir"
          fi
        done
        if [ "$$#" -eq 0 ]; then
          printf '%s\n' 'forge-fmt: no dapp src/test/script directories found' >&2
          exit 2
        fi
        forge fmt --check "$@"

  # Compilation should not write artifacts into the working tree; outputs go
  # to tmpfs through FOUNDRY_OUT and FOUNDRY_CACHE_PATH.
  forge-build:
    <<: *forge_base
    command:
      - "sh"
      - "-eu"
      - "-c"
      - |
        set --
        for dir in */src; do
          if [ -d "$$dir" ]; then
            set -- "$$@" "$$dir"
          fi
        done
        if [ "$$#" -eq 0 ]; then
          printf '%s\n' 'forge-build: no dapp src directories found' >&2
          exit 2
        fi
        forge build --offline "$@"

  # Deployment scripts are compiled routinely, but they are not executed here.
  # Broadcast/RPC/private-key handling belongs in scenario-specific compose files.
  forge-script-build:
    <<: *forge_base
    command:
      - "sh"
      - "-eu"
      - "-c"
      - |
        set --
        for dir in */script; do
          if [ -d "$$dir" ]; then
            set -- "$$@" "$$dir"
          fi
        done
        if [ "$$#" -eq 0 ]; then
          printf '%s\n' 'forge-script-build: no dapp script directories found'
          exit 0
        fi
        forge build --offline "$@"

  # ABI export is split into a structured manifest-planning step and a Forge
  # materialization step. Keep JSON parsing in Python instead of scraping CAM
  # manifests with sed/awk inside the Forge shell.
  forge-abi-plan:
    <<: *offline_hardened
    build:
      context: ../containers/checks
      dockerfile: Dockerfile
    working_dir: /work
    volumes:
      - ../dapps:/work/dapps:ro
      - ../tools/cam_abi_plan.py:/work/tools/cam_abi_plan.py:ro
      - ../tools/forge-abi-plan.py:/work/tools/forge-abi-plan.py:ro
      - ../tools/json_policy.py:/work/tools/json_policy.py:ro
      - ${ABI_PLAN_DIR:?missing_ABI_PLAN_DIR}:/work/abi-plan:rw
    command:
      - "-I"
      - "-B"
      - "/work/tools/forge-abi-plan.py"
      - "/work/dapps"
      - "/work/abi-plan/manifest.tsv"

  # ABI export is the one routine Forge lane that writes into the dapp tree.
  # Only dapps listed by forge-abi-plan participate. Outputs are staged in
  # tmpfs first so a failed inspection does not erase the last good ABI set.
  # Keep dapps/ read-only and mount each generated abi/ directory as the only
  # writable host path.
  forge-abi:
    <<: *forge_base
    volumes:
      - ${ABI_PLAN_DIR:?missing_ABI_PLAN_DIR}:/work/abi-plan:ro
      - ../dapps:/work/dapps:ro
      - ../dapps/bike-nft/cam/abi:/work/dapps/bike-nft/cam/abi:rw
    command:
      - "sh"
      - "-eu"
      - "-c"
      - |
        plan="/work/abi-plan/manifest.tsv"
        if [ ! -s "$$plan" ]; then
          printf '%s\n' 'forge-abi: missing ABI export plan; run forge-abi-plan first' >&2
          exit 2
        fi

        staged_root="$$(mktemp -d)"

        while IFS="	" read -r dapp inspect_target abi_name; do
          if [ -z "$$dapp" ] || [ -z "$$inspect_target" ] || [ -z "$$abi_name" ]; then
            printf 'forge-abi: invalid ABI export plan row: %s %s %s\n' "$$dapp" "$$inspect_target" "$$abi_name" >&2
            exit 2
          fi
          abi_dir="$$dapp/cam/abi"
          if [ ! -d "$$abi_dir" ]; then
            printf 'forge-abi: %s must exist before ABI export; do not let Docker create bind targets\n' "$$abi_dir" >&2
            exit 2
          fi

          mkdir -p "$$staged_root/$$dapp"
          forge inspect --json "$$inspect_target" abi > "$$staged_root/$$dapp/$$abi_name"
        done < "$$plan"

        while IFS="	" read -r dapp inspect_target abi_name; do
          abi_dir="$$dapp/cam/abi"

          if [ ! -e "$$staged_root/$$dapp/.cleared" ]; then
            touch "$$staged_root/$$dapp/.cleared"
            find "$$abi_dir" -maxdepth 1 -type f -name '*.json' -delete
          fi

          mv "$$staged_root/$$dapp/$$abi_name" "$$abi_dir/$$abi_name"
          printf 'forge-abi: wrote %s\n' "$$abi_dir/$$abi_name"
        done < "$$plan"

  # Routine unit tests for every dapp. Repository/source hygiene checks live in
  # tests/checks and are wired through `make test` before this Forge lane runs.
  forge-test:
    <<: *forge_base
    command:
      - "forge"
      - "test"
      - "--offline"
      - "--match-path"
      - "*/test/unit/**/*.sol"
      - "-vvv"

  # Fuzz tests are separated as a Make target because they are usually heavier
  # than unit tests, but they keep the same offline container posture.
  forge-fuzz:
    <<: *forge_base
    command:
      - "forge"
      - "test"
      - "--offline"
      - "--match-path"
      - "*/test/fuzz/**/*.sol"
      - "-vvv"

  # Invariant tests are also heavier and often state-machine oriented. They
  # still run offline and read-only by default.
  forge-invariant:
    <<: *forge_base
    command:
      - "forge"
      - "test"
      - "--offline"
      - "--match-path"
      - "*/test/invariant/**/*.sol"
      - "-vvv"

  # Coverage is a reporting lane over the same unit-test convention as
  # forge-test, keeping it out of Soldeer's dependencies/ tree.
  forge-coverage:
    <<: *forge_base
    command:
      - "forge"
      - "coverage"
      - "--offline"
      - "--match-path"
      - "*/test/unit/**/*.sol"
