# Offline Node terminal for the headless CAM viewer session.
#
# The terminal command loop is backend-neutral. This Compose lane is deliberately
# networkless; today it supports only explicit mock fixtures selected by
# CAM_VIEWER_MOCK. A real local-RPC backend uses a separate Compose stack rather
# than weakening this offline lane.

x-viewer-terminal-volumes: &viewer_terminal_volumes
  - ../dapps/bike-nft/cam:/work/cam/bike-nft:ro
  - ../js:/input/js:ro
  - ../js/node_modules:/work/js/node_modules:ro
  - ../tests/fixtures:/work/tests/fixtures:ro

x-viewer-terminal-base: &viewer_terminal_base
  extends:
    file: fragments/node-workspace.yml
    service: offline-node-workspace
  working_dir: /work
  environment:
    CAM_VIEWER_BACKEND: mock
    CAM_VIEWER_MOCK: "${CAM_VIEWER_MOCK:?missing_CAM_VIEWER_MOCK}"
    # Mock CAM fixtures are intentionally unsigned and start at the entry route.
    CAM_VIEWER_ALLOW_UNSIGNED_CAM_HASH: "true"
    CAM_VIEWER_INITIAL_INPUTS_JSON: "{}"
  volumes: *viewer_terminal_volumes

services:
  viewer-terminal:
    <<: *viewer_terminal_base
    container_name: "${VIEWER_TERMINAL_CONTAINER_NAME:?missing_VIEWER_TERMINAL_CONTAINER_NAME}"
    stdin_open: true
    tty: true
    command:
      - "run-js-workspace"
      - "sh"
      - "-eu"
      - "-c"
      - |
        npm run build:workspace
        ./node_modules/.bin/tsc -p tools/viewer-terminal/tsconfig.json
        node --experimental-strip-types tools/viewer-terminal/terminal-session.ts

  viewer-terminal-check:
    <<: *viewer_terminal_base
    command:
      - "run-js-workspace"
      - "sh"
      - "-eu"
      - "-c"
      - |
        npm run build:workspace
        ./node_modules/.bin/tsc -p tools/viewer-terminal/tsconfig.json
        node --test --experimental-strip-types tools/viewer-terminal/**/*.test.ts
        printf "set serialNumber ABC123\npress 1\npress 2\nquit\n" | node --experimental-strip-types tools/viewer-terminal/terminal-session.ts >/dev/null
