# Offline Node terminal for the headless CAM viewer session.
#
# These services are deliberately mock-backed and networkless. They are not
# real chain/RPC viewers; they prove that the viewer state machine can be
# driven over stdin/stdout against checked-in CAM resources while contract reads
# are faked inside tools/viewer-terminal/terminal-session.ts.
x-dist-cam-core: &dist_cam_core
  type: tmpfs
  target: /work/packages/cam-core/dist
  tmpfs:
    mode: 511

x-dist-cam-evm-viem: &dist_cam_evm_viem
  type: tmpfs
  target: /work/packages/cam-evm-viem/dist
  tmpfs:
    mode: 511

x-dist-cam-screen: &dist_cam_screen
  type: tmpfs
  target: /work/packages/cam-screen/dist
  tmpfs:
    mode: 511

x-dist-cam-viewer: &dist_cam_viewer
  type: tmpfs
  target: /work/packages/cam-viewer/dist
  tmpfs:
    mode: 511

x-viewer-terminal-volumes: &viewer_terminal_volumes
  - ../dapps:/work/dapps:ro
  - ../packages:/work/packages:ro
  - ../tools:/work/tools:ro
  - *dist_cam_core
  - *dist_cam_evm_viem
  - *dist_cam_screen
  - *dist_cam_viewer

x-viewer-terminal-base: &viewer_terminal_base
  build:
    context: ../containers/node-deps
    dockerfile: Dockerfile
  working_dir: /work
  user: "${LOCAL_UID:?missing_LOCAL_UID}:${LOCAL_GID:?missing_LOCAL_GID}"
  read_only: true
  network_mode: "none"
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  pids_limit: 384
  mem_limit: 1g
  environment:
    HOME: /tmp/home
    npm_config_cache: /tmp/npm-cache
    npm_config_audit: "false"
    npm_config_fund: "false"
    npm_config_update_notifier: "false"
  tmpfs:
    - /tmp:rw,nosuid,nodev,noexec,size=256m
  volumes: *viewer_terminal_volumes

services:
  viewer-terminal:
    <<: *viewer_terminal_base
    container_name: "${VIEWER_TERMINAL_CONTAINER_NAME:?missing_VIEWER_TERMINAL_CONTAINER_NAME}"
    stdin_open: true
    tty: true
    command:
      - "sh"
      - "-eu"
      - "-c"
      - |
        cd /work/packages
        npm run build:packages
        cd /work
        node --experimental-strip-types tools/viewer-terminal/terminal-session.ts

  viewer-terminal-check:
    <<: *viewer_terminal_base
    command:
      - "sh"
      - "-eu"
      - "-c"
      - |
        cd /work/packages
        npm run build:packages
        ./node_modules/.bin/tsc -p ../tools/viewer-terminal/tsconfig.json
        cd /work
        printf "quit\n" | node --experimental-strip-types tools/viewer-terminal/terminal-session.ts >/dev/null
