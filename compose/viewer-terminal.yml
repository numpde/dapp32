# Offline interactive Node terminal for the headless CAM viewer session.
#
# This service is deliberately mock-backed and networkless. It proves that the
# viewer state machine can be driven over stdin/stdout without giving the
# container RPC access or general egress.
services:
  viewer-terminal:
    build:
      context: ../containers/node-deps
      dockerfile: Dockerfile
    working_dir: /work
    user: "${LOCAL_UID:?missing_LOCAL_UID}:${LOCAL_GID:?missing_LOCAL_GID}"
    read_only: true
    network_mode: "none"
    stdin_open: true
    tty: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    mem_limit: 512m
    environment:
      HOME: /tmp/home
      CAM_VIEWER_MODE: "${CAM_VIEWER_MODE:-mock}"
      CAM_VIEWER_CAM_URI: "${CAM_VIEWER_CAM_URI:-file:///work/dapps/bike-nft/cam/main.json}"
      CAM_VIEWER_RESOURCE_BASE_URIS: "${CAM_VIEWER_RESOURCE_BASE_URIS:-file:///work/dapps/bike-nft/cam/}"
      CAM_VIEWER_ALLOWED_SCHEMES: "${CAM_VIEWER_ALLOWED_SCHEMES:-file}"
      CAM_VIEWER_HOST_ADDRESS: "${CAM_VIEWER_HOST_ADDRESS:-0x0000000000000000000000000000000000000001}"
      CAM_VIEWER_ACCOUNT_ADDRESS: "${CAM_VIEWER_ACCOUNT_ADDRESS:-0x0000000000000000000000000000000000000002}"
      CAM_VIEWER_CHAIN_ID: "${CAM_VIEWER_CHAIN_ID:-eip155:31337}"
      npm_config_cache: /tmp/npm-cache
      npm_config_audit: "false"
      npm_config_fund: "false"
      npm_config_update_notifier: "false"
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=256m
    volumes:
      - ../package.json:/work/package.json:ro
      - ../package-lock.json:/work/package-lock.json:ro
      - ../node_modules:/work/node_modules:ro
      - ../dapps:/work/dapps:ro
      - ../packages:/work/packages:ro
    command:
      - "node"
      - "--experimental-strip-types"
      - "packages/cam-viewer/examples/terminal-session.ts"
