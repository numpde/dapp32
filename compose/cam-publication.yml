# CAM publication preflight for one local dapp.
#
# This is the builder-facing gate before putting CAM bytes behind a contract
# root. It assembles the local root manifest plus declared local resources,
# runs @cam/conformance, then prints the exact CAM_HASH to publish.
# This repo lane intentionally has no URI-to-file mapping flags: it attests the
# checked-in dapp shape where secondary resources are local ./ declarations. Use
# @cam/conformance directly for bundles assembled from content-addressed stores.

services:
  cam-publication-preflight:
    extends:
      file: fragments/node-workspace.yml
      service: offline-node-workspace
    working_dir: /work/js
    environment:
      CAM_PREFLIGHT_ROOT_PATH: "${CAM_PREFLIGHT_ROOT_PATH:?missing_CAM_PREFLIGHT_ROOT_PATH}"
      CAM_PREFLIGHT_ARGS: "${CAM_PREFLIGHT_ARGS?missing_CAM_PREFLIGHT_ARGS}"
      CAM_URI: "${CAM_URI:?missing_CAM_URI}"
    volumes:
      - ../dapps:/work/dapps:ro
      - ../js:/input/js:ro
      - ../js/node_modules:/work/js/node_modules:ro
    command:
      - "run-js-workspace"
      - "sh"
      - "-eu"
      - "-c"
      - |
        npm run build:cam-conformance >&2
        ./node_modules/.bin/tsc -p tools/cam-publication-preflight/tsconfig.json >&2
        case "$CAM_PREFLIGHT_ARGS" in
          "") set -- ;;
          "--json") set -- --json ;;
          *) printf '%s\n' "invalid CAM_PREFLIGHT_ARGS: $CAM_PREFLIGHT_ARGS" >&2; exit 2 ;;
        esac
        node --experimental-strip-types tools/cam-publication-preflight/main.ts \
          --dapps-root /work/dapps \
          --root "$CAM_PREFLIGHT_ROOT_PATH" \
          --cam-uri "$CAM_URI" \
          "$@"
