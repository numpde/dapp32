# Cast command lanes.
#
# Cast can be either purely local/offline, or networked against an RPC
# endpoint. Keep both in this file because they share the same tool image, but
# make the network boundary explicit per service.
x-cast-base: &cast_base
  # Cast uses the same repo-owned Foundry image as the Forge and Anvil lanes.
  # This keeps the tool version policy in one Dockerfile.
  build:
    context: ../containers/foundry
    dockerfile: Dockerfile
  working_dir: /work/on-chain
  user: "${LOCAL_UID:?missing_LOCAL_UID}:${LOCAL_GID:?missing_LOCAL_GID}"
  read_only: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  pids_limit: 128
  mem_limit: 512m
  environment:
    HOME: /tmp/home
    XDG_DATA_HOME: /usr/local/share
    FOUNDRY_CACHE_PATH: /tmp/foundry-cache
    FOUNDRY_CONFIG: /work/on-chain/foundry.toml
  tmpfs:
    - /tmp:rw,nosuid,nodev,noexec,size=128m
  volumes:
    - ..:/work:ro

services:
  # Offline ABI/calldata/help operations. No RPC, no network.
  cast-offline:
    <<: *cast_base
    network_mode: "none"
    command: ["cast", "--version"]

  # Explicit read-only RPC inspection. Cast is attached only to the internal
  # RPC network and talks to the proxy below; it never receives arbitrary
  # egress. This lane must not be used for signing or sending transactions.
  cast-rpc:
    <<: *cast_base
    networks:
      - rpc_internal
    depends_on:
      rpc-proxy:
        condition: service_healthy
    command: ["cast", "block-number", "--rpc-url", "http://rpc-proxy:8080"]

  # The proxy is the only container in this compose file with egress. It reads
  # the upstream URL from a temporary Docker secret file created by the Makefile,
  # validates that it resolves only to global IP addresses, and forwards only
  # explicitly allowed read-only JSON-RPC methods to that upstream.
  rpc-proxy:
    build:
      context: ../containers/rpc-proxy
      dockerfile: Dockerfile
    init: true
    user: "65532:65532"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 64
    mem_limit: 128m
    environment:
      RPC_UPSTREAM_FILE: /run/secrets/rpc_url
      RPC_ALLOWED_METHODS: eth_blockNumber
    secrets:
      - source: rpc_url
        target: rpc_url
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=16m
    networks:
      rpc_internal:
        aliases:
          - rpc-proxy
      rpc_egress: {}
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=2).close()"
      interval: 2s
      timeout: 2s
      retries: 10

secrets:
  rpc_url:
    file: "${RPC_URL_FILE:-/dev/null}"

networks:
  rpc_internal:
    internal: true
  rpc_egress: {}
