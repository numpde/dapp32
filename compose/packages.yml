# Offline npm workspace build/test lanes.
#
# This file deliberately does not install dependencies and has no network. Run
# make package-deps first to materialize packages/node_modules/ from the
# committed packages/package-lock.json through compose/package-deps.yml.
x-package-base: &package_base
  build:
    context: ../containers/node-deps
    dockerfile: Dockerfile
  working_dir: /work/packages
  user: "${LOCAL_UID:?missing_LOCAL_UID}:${LOCAL_GID:?missing_LOCAL_GID}"
  read_only: true
  network_mode: "none"
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  pids_limit: 384
  mem_limit: 1g
  environment:
    HOME: /tmp/home
    npm_config_cache: /tmp/npm-cache
    npm_config_audit: "false"
    npm_config_fund: "false"
    npm_config_update_notifier: "false"
  tmpfs:
    - /tmp:rw,nosuid,nodev,noexec,size=512m

x-dist-cam-core: &dist_cam_core
  type: tmpfs
  target: /work/packages/cam-core/dist
  tmpfs:
    mode: 511

x-dist-cam-evm-viem: &dist_cam_evm_viem
  type: tmpfs
  target: /work/packages/cam-evm-viem/dist
  tmpfs:
    mode: 511

x-dist-cam-screen: &dist_cam_screen
  type: tmpfs
  target: /work/packages/cam-screen/dist
  tmpfs:
    mode: 511

x-dist-cam-viewer: &dist_cam_viewer
  type: tmpfs
  target: /work/packages/cam-viewer/dist
  tmpfs:
    mode: 511

x-package-build-volumes: &package_build_volumes
  - ../packages:/work/packages:ro
  - *dist_cam_core
  - *dist_cam_evm_viem
  - *dist_cam_screen
  - *dist_cam_viewer

x-package-test-volumes: &package_test_volumes
  - ../dapps:/work/dapps:ro
  - ../packages:/work/packages:ro
  - *dist_cam_core
  - *dist_cam_evm_viem
  - *dist_cam_screen
  - *dist_cam_viewer

services:
  # This is an offline dependency-graph check, not a file-integrity verifier.
  # npm's lockfile pins tarball integrity, but npm does not provide a committed
  # per-file checksum manifest for node_modules/. The practical gate before
  # package code runs is therefore `npm ls`: check that the installed workspace
  # dependency graph is present and consistent with package.json/package-lock.json.
  package-graph-check:
    <<: *package_base
    volumes:
      - ../packages:/work/packages:ro
    command:
      - "sh"
      - "-eu"
      - "-c"
      - |
        npm ls --all --workspaces --ignore-scripts --offline --omit=optional --json >/tmp/package-graph-check.json
        printf '%s\n' 'package-graph-check: installed npm dependency graph is consistent with package manifests and lock metadata'

  # Package build-check validates compilation only. It does not export durable
  # artifacts; package dist/ outputs live only in container-local tmpfs mounts.
  # Add a separate artifact-export lane if host-visible JS output is ever needed.
  package-build-check:
    <<: *package_base
    volumes: *package_build_volumes
    command:
      - "npm"
      - "run"
      - "build:packages"

  package-test:
    <<: *package_base
    volumes: *package_test_volumes
    command:
      - "npm"
      - "run"
      - "test:packages"
