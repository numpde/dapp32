# Offline npm workspace build/test lanes.
#
# This file deliberately does not install dependencies and has no network. Run
# make package-deps first to materialize root node_modules/ from the committed
# package-lock.json through compose/package-deps.yml.
x-package-base: &package_base
  build:
    context: ../containers/node-deps
    dockerfile: Dockerfile
  working_dir: /work
  user: "${LOCAL_UID:?missing_LOCAL_UID}:${LOCAL_GID:?missing_LOCAL_GID}"
  read_only: true
  network_mode: "none"
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  pids_limit: 384
  mem_limit: 1g
  environment:
    HOME: /tmp/home
    npm_config_cache: /tmp/npm-cache
    npm_config_audit: "false"
    npm_config_fund: "false"
    npm_config_update_notifier: "false"
  tmpfs:
    - /tmp:rw,nosuid,nodev,noexec,size=512m

services:
  # This is an offline dependency-graph check, not a file-integrity verifier.
  # npm's lockfile pins tarball integrity, but npm does not provide a committed
  # per-file checksum manifest for node_modules/. The practical gate before
  # package code runs is therefore `npm ls`: check that the installed workspace
  # dependency graph is present and consistent with package.json/package-lock.json.
  package-graph-check:
    <<: *package_base
    volumes:
      - ../package.json:/work/package.json:ro
      - ../package-lock.json:/work/package-lock.json:ro
      - ../node_modules:/work/node_modules:ro
      - ../packages:/work/packages:ro
    command:
      - "sh"
      - "-eu"
      - "-c"
      - |
        npm ls --all --workspaces --ignore-scripts --offline --omit=optional --json >/tmp/package-graph-check.json
        printf '%s\n' 'package-graph-check: installed npm dependency graph is consistent with package manifests and lock metadata'

  # Package build is the only npm package lane with a writable packages/ mount.
  # The workspace convention is intentionally narrow: each package build script
  # runs `tsc -p tsconfig.json`, each tsconfig reads src/**/*.ts, and emitted
  # artifacts go under that package's ignored dist/ directory.
  package-build:
    <<: *package_base
    volumes:
      - ../package.json:/work/package.json:ro
      - ../package-lock.json:/work/package-lock.json:ro
      - ../node_modules:/work/node_modules:ro
      - ../packages:/work/packages:rw
    command:
      - "npm"
      - "run"
      - "build:packages"

  package-test:
    <<: *package_base
    volumes:
      - ../package.json:/work/package.json:ro
      - ../package-lock.json:/work/package-lock.json:ro
      - ../node_modules:/work/node_modules:ro
      - ../dapps:/work/dapps:ro
      - ../packages:/work/packages:ro
    command:
      - "npm"
      - "test"
      - "--workspaces"
      - "--if-present"
