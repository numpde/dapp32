# Offline JS workspace build/test lanes.
#
# This file deliberately does not install dependencies and has no network. Run
# make package-deps first to materialize js/node_modules/ from the committed
# js/package-lock.json through compose/package-deps.yml.
x-package-base: &package_base
  extends:
    file: fragments/node-workspace.yml
    service: offline-node-workspace
  working_dir: /work/js

x-package-volumes: &package_volumes
  - ../js:/input/js:ro
  - ../js/node_modules:/work/js/node_modules:ro

services:
  # This is an offline dependency-graph check, not a file-integrity verifier.
  # npm's lockfile pins tarball integrity, but npm does not provide a committed
  # per-file checksum manifest for node_modules/. The practical gate before
  # JS workspace code runs is therefore `npm ls`: check that the installed workspace
  # dependency graph is present and consistent with package.json/package-lock.json.
  package-graph-check:
    <<: *package_base
    volumes: *package_volumes
    command:
      - "run-js-workspace"
      - "printf"
      - "%s\n"
      - "package-graph-check: installed npm dependency graph is consistent with package manifests and lock metadata"

  # package-build-check validates compilation only. It does not export durable
  # artifacts; JS dist/ outputs live only in container-local tmpfs mounts.
  # Add a separate artifact-export lane if host-visible JS output is ever needed.
  package-build-check:
    <<: *package_base
    volumes: *package_volumes
    command:
      - "run-js-workspace"
      - "npm"
      - "run"
      - "build:workspace"

  package-test:
    <<: *package_base
    volumes:
      - ../dapps:/work/dapps:ro
      - ../js:/input/js:ro
      - ../js/node_modules:/work/js/node_modules:ro
      - ../tests/fixtures:/work/tests/fixtures:ro
    command:
      - "run-js-workspace"
      - "npm"
      - "run"
      - "test:workspace"

  cam-conformance-check:
    <<: *package_base
    volumes:
      - ../dapps:/work/dapps:ro
      - ../js:/input/js:ro
      - ../js/node_modules:/work/js/node_modules:ro
      - ../tests/fixtures:/work/tests/fixtures:ro
    command:
      - "run-js-workspace"
      - "npm"
      - "run"
      - "test:cam-conformance"
