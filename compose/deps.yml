# Dependency installation lane.
#
# This file is intentionally separate from compose/forge.yml. Installing
# dependencies needs network access, but networked dependency tools should not
# receive write access to the repository. The lane is split into stages:
# - dependency-egress-proxy is the only service with external egress. It allows
#   HTTPS CONNECT only to global IP addresses on port 443.
# - soldeer-stage is on an internal network, reads only dependency input files,
#   verifies upstream archives against soldeer.lock, applies declared local
#   patches with pre/patch/post checksums, and writes only to a Docker volume.
# - soldeer-apply-locked has no network, can write only dependencies/, and
#   fails if locked metadata would change.
# - soldeer-apply-update has no network and can write dependency metadata only
#   when make deps is run with ALLOW_UPDATE=1.
# - soldeer-verify has no network and verifies installed dependency contents.
# Routine build/test lanes must stay offline and read-only.
services:
  dependency-egress-proxy:
    build:
      context: ../containers/https-egress-proxy
      dockerfile: Dockerfile
    init: true
    user: "65532:65532"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 64
    mem_limit: 128m
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=16m
    networks:
      deps_internal:
        aliases:
          - dependency-egress-proxy
      deps_egress: {}
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=2).close()"
      interval: 2s
      timeout: 2s
      retries: 10

  soldeer-stage:
    build:
      context: ../containers/foundry-deps
      dockerfile: Dockerfile
    working_dir: /tmp
    depends_on:
      dependency-egress-proxy:
        condition: service_healthy
    user: "${LOCAL_UID:?missing_LOCAL_UID}:${LOCAL_GID:?missing_LOCAL_GID}"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    mem_limit: 1g
    environment:
      HOME: /tmp/home
      HTTP_PROXY: http://dependency-egress-proxy:8080
      HTTPS_PROXY: http://dependency-egress-proxy:8080
      ALL_PROXY: http://dependency-egress-proxy:8080
      http_proxy: http://dependency-egress-proxy:8080
      https_proxy: http://dependency-egress-proxy:8080
      all_proxy: http://dependency-egress-proxy:8080
      NO_PROXY: localhost,127.0.0.1,::1,dependency-egress-proxy
      no_proxy: localhost,127.0.0.1,::1,dependency-egress-proxy
      XDG_DATA_HOME: /usr/local/share
      FOUNDRY_CACHE_PATH: /tmp/foundry-cache
      FOUNDRY_CONFIG: /tmp/soldeer-work/foundry.toml
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=512m
    volumes:
      - ../foundry.toml:/input/foundry.toml:ro
      - ../soldeer.lock:/input/soldeer.lock:ro
      - ../remappings.txt:/input/remappings.txt:ro
      - ../dependency-patches.txt:/input/dependency-patches.txt:ro
      - ../patches:/input/patches:ro
      - ../tests/checks/test_dependency_integrity.py:/input/test_dependency_integrity.py:ro
      - soldeer-out:/out:rw
    networks:
      - deps_internal
    command:
      - "bash"
      - "-lc"
      - |
        set -euo pipefail
        apply_dependency_patches() {
          while read -r dependency target patch_file pre_hash patch_hash post_hash extra; do
            case "$${dependency:-}" in
              ""|\#*) continue ;;
            esac
            if [ -n "$${extra:-}" ]; then
              printf 'dependency-patches: malformed line for %s\n' "$$dependency" >&2
              exit 2
            fi
            case "$$dependency" in
              */*) printf 'dependency-patches: dependency key must be a single directory name: %s\n' "$$dependency" >&2; exit 2 ;;
            esac
            case "$$target" in
              ""|/*|../*|*/../*|*/..)
                printf 'dependency-patches: unsafe target path: %s\n' "$$target" >&2
                exit 2 ;;
            esac
            case "$$patch_file" in
              ""|/*|../*|*/../*|*/..)
                printf 'dependency-patches: unsafe patch path: %s\n' "$$patch_file" >&2
                exit 2 ;;
            esac

            target_path="dependencies/$$dependency/$$target"
            patch_path="/input/$$patch_file"
            test -f "$$target_path"
            test -f "$$patch_path"
            printf '%s  %s\n' "$$pre_hash" "$$target_path" | sha256sum -c -
            printf '%s  %s\n' "$$patch_hash" "$$patch_path" | sha256sum -c -
            patch --directory="dependencies/$$dependency" --strip=1 --forward --batch --fuzz=0 --input="$$patch_path"
            printf '%s  %s\n' "$$post_hash" "$$target_path" | sha256sum -c -
          done < /input/dependency-patches.txt
        }

        rm -rf /tmp/soldeer-work /out/dependencies /out/soldeer.lock /out/remappings.txt /out/dependency-checksums.txt
        mkdir -p /tmp/soldeer-work
        cp /input/foundry.toml /tmp/soldeer-work/foundry.toml
        cp /input/soldeer.lock /tmp/soldeer-work/soldeer.lock
        cp /input/remappings.txt /tmp/soldeer-work/remappings.txt
        cd /tmp/soldeer-work
        forge soldeer install --config-location foundry
        test -d dependencies
        test -f soldeer.lock
        test -f remappings.txt
        python3 -I -B /input/test_dependency_integrity.py --verify-upstream /tmp/soldeer-work
        apply_dependency_patches
        python3 -I -B /input/test_dependency_integrity.py --write-checksums /tmp/soldeer-work
        test -f dependency-checksums.txt
        cp -a dependencies /out/dependencies
        cp soldeer.lock /out/soldeer.lock
        cp remappings.txt /out/remappings.txt
        cp dependency-checksums.txt /out/dependency-checksums.txt

  soldeer-apply-locked:
    build:
      context: ../containers/foundry
      dockerfile: Dockerfile
    working_dir: /work
    user: "${LOCAL_UID:?missing_LOCAL_UID}:${LOCAL_GID:?missing_LOCAL_GID}"
    read_only: true
    network_mode: "none"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    mem_limit: 512m
    environment:
      HOME: /tmp/home
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=64m
    volumes:
      - soldeer-out:/out:ro
      - ../dependencies:/work/dependencies:rw
      - ../soldeer.lock:/work/soldeer.lock:ro
      - ../remappings.txt:/work/remappings.txt:ro
      - ../dependency-checksums.txt:/work/dependency-checksums.txt:ro
    command:
      - "bash"
      - "-lc"
      - |
        set -euo pipefail
        test -d /out/dependencies
        test -f /out/soldeer.lock
        test -f /out/remappings.txt
        test -f /out/dependency-checksums.txt
        for file in soldeer.lock remappings.txt dependency-checksums.txt; do
          if ! cmp -s "/out/$$file" "/work/$$file"; then
            printf 'soldeer-apply-locked: %s would change; rerun make deps ALLOW_UPDATE=1 only if this dependency update is intended.\n' "$$file" >&2
            exit 2
          fi
        done
        find /work/dependencies -mindepth 1 -maxdepth 1 -exec rm -rf -- {} +
        cp -a /out/dependencies/. /work/dependencies/

  soldeer-apply-update:
    build:
      context: ../containers/foundry
      dockerfile: Dockerfile
    working_dir: /work
    user: "${LOCAL_UID:?missing_LOCAL_UID}:${LOCAL_GID:?missing_LOCAL_GID}"
    read_only: true
    network_mode: "none"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    mem_limit: 512m
    environment:
      HOME: /tmp/home
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=64m
    volumes:
      - soldeer-out:/out:ro
      - ../dependencies:/work/dependencies:rw
      - ../soldeer.lock:/work/soldeer.lock:rw
      - ../remappings.txt:/work/remappings.txt:rw
      - ../dependency-checksums.txt:/work/dependency-checksums.txt:rw
    command:
      - "bash"
      - "-lc"
      - |
        set -euo pipefail
        test -d /out/dependencies
        test -f /out/soldeer.lock
        test -f /out/remappings.txt
        test -f /out/dependency-checksums.txt
        find /work/dependencies -mindepth 1 -maxdepth 1 -exec rm -rf -- {} +
        cp -a /out/dependencies/. /work/dependencies/
        cp /out/soldeer.lock /work/soldeer.lock
        cp /out/remappings.txt /work/remappings.txt
        cp /out/dependency-checksums.txt /work/dependency-checksums.txt

  soldeer-verify:
    build:
      context: ../containers/checks
      dockerfile: Dockerfile
    working_dir: /work
    user: "${LOCAL_UID:?missing_LOCAL_UID}:${LOCAL_GID:?missing_LOCAL_GID}"
    read_only: true
    network_mode: "none"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    mem_limit: 512m
    environment:
      HOME: /tmp/home
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=64m
    volumes:
      - ../tests/checks/test_dependency_integrity.py:/input/test_dependency_integrity.py:ro
      - ../foundry.toml:/work/foundry.toml:ro
      - ../dependencies:/work/dependencies:ro
      - ../soldeer.lock:/work/soldeer.lock:ro
      - ../remappings.txt:/work/remappings.txt:ro
      - ../dependency-checksums.txt:/work/dependency-checksums.txt:ro
      - ../dependency-patches.txt:/work/dependency-patches.txt:ro
      - ../patches:/work/patches:ro
    command:
      - "-I"
      - "-B"
      - "/input/test_dependency_integrity.py"
      - "/work"

volumes:
  soldeer-out: {}

networks:
  deps_internal:
    internal: true
  deps_egress: {}
