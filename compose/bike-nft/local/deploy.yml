# Local bike NFT fixture scenario.
#
# Reusable local deployment fixture for the bike NFT dapp.
#
# This file owns the chain and contract deployment only: it starts a private
# Anvil chain and runs the bike NFT local deployment script against it. Consumer
# overlays can compose with this fixture for terminals, web viewers, or smoke
# tests without baking those UI/debug concerns into the base deployment.
#
# The deploy service uses an obvious local-only fixture private key, mounts
# only the checked-in Foundry project inputs it needs read-only, and writes
# Forge's broadcast receipt to a scenario-scoped Docker volume. Consumers can
# read that receipt without host writes or direct access to deployment internals.
services:
  bike-nft-anvil:
    build:
      context: ../../../containers/foundry
      dockerfile: Dockerfile
    working_dir: /work
    init: true
    user: "${LOCAL_UID:?missing_LOCAL_UID}:${LOCAL_GID:?missing_LOCAL_GID}"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    mem_limit: 1g
    environment:
      HOME: /tmp/home
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=256m
    networks:
      - bike_nft_local
    command:
      - "anvil"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8545"
    healthcheck:
      test:
        - "CMD"
        - "cast"
        - "block-number"
        - "--rpc-url"
        - "http://127.0.0.1:8545"
      interval: 2s
      timeout: 3s
      retries: 20
      start_period: 2s

  deploy-bike-nft-local:
    build:
      context: ../../../containers/foundry
      dockerfile: Dockerfile
    working_dir: /work/dapps
    depends_on:
      bike-nft-anvil:
        condition: service_healthy
    user: "${LOCAL_UID:?missing_LOCAL_UID}:${LOCAL_GID:?missing_LOCAL_GID}"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    mem_limit: 1g
    environment:
      HOME: /tmp/home
      XDG_DATA_HOME: /usr/local/share
      FOUNDRY_CACHE_PATH: /tmp/foundry-cache
      FOUNDRY_CONFIG: /work/dapps/foundry.toml
      FOUNDRY_OUT: /tmp/foundry-out
      FOUNDRY_BROADCAST: "${BIKE_NFT_BROADCAST_DIR:?missing_BIKE_NFT_BROADCAST_DIR}"
      CAM_URI: "${CAM_URI:?missing_CAM_URI}"
      CAM_HASH: "${CAM_HASH:?missing_CAM_HASH}"
      # Public Anvil default account private key. This is a local fixture key,
      # not an operator secret, and must not be reused outside local chains.
      PRIVATE_KEY: "0xbabababababababababababababababababababababababababababababababa"
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=512m
    volumes:
      - ../../../dapps/foundry.toml:/work/dapps/foundry.toml:ro
      - ../../../dapps/remappings.txt:/work/dapps/remappings.txt:ro
      - ../../../dapps/dependencies:/work/dapps/dependencies:ro
      - ../../../dapps/bike-nft:/work/dapps/bike-nft:ro
      - ../../../dapps/cam:/work/dapps/cam:ro
      - "bike_nft_broadcast:${BIKE_NFT_BROADCAST_DIR:?missing_BIKE_NFT_BROADCAST_DIR}"
    networks:
      - bike_nft_local
    command:
      - "bash"
      - "-lc"
      - |
        set -euo pipefail
        # The fixture key is intentionally obvious and not one of Anvil's
        # default funded accounts, so fund it explicitly on this local chain.
        fixture_deployer="$(cast wallet address --private-key "$${PRIVATE_KEY}")"
        cast rpc anvil_setBalance "$${fixture_deployer}" 0x3635C9ADC5DEA00000 \
          --rpc-url http://bike-nft-anvil:8545 >/dev/null
        forge script --offline bike-nft/script/DeployBikeNftLocal.s.sol \
          --rpc-url http://bike-nft-anvil:8545 \
          --broadcast \
          -vvv

networks:
  bike_nft_local:
    internal: true

volumes:
  bike_nft_broadcast:
