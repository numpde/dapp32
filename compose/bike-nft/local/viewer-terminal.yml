# Local bike NFT viewer terminal scenario.
#
# Terminal-viewer overlay for the reusable bike NFT local deployment fixture.
#
# Compose this file with deploy.yml and http.yml when the deployed fixture
# should be driven through the headless viewer terminal. Keeping this as an
# overlay lets deployment and CAM resource serving stay reusable for other
# consumers, such as a future web viewer or smoke-test lane.
#
# The overlay redirects Forge broadcast output into a named volume and starts
# the terminal against the deployed CamRoot discovered from Forge's broadcast
# JSON. The separate HTTP overlay serves the CAM resources the terminal loads.

services:
  deploy-bike-nft-local:
    environment:
      # Override the deploy fixture's tmpfs broadcast path so Forge writes the
      # deployment receipt into the shared scenario volume below. The terminal
      # reads run-latest.json from the same volume to discover CamRoot and the
      # deployed dapp contract addresses.
      FOUNDRY_BROADCAST: /foundry-broadcast
    volumes:
      - bike_nft_runtime:/foundry-broadcast

  bike-nft-viewer-terminal:
    build:
      context: ../../../containers/node-deps
      dockerfile: Dockerfile
    working_dir: /work
    depends_on:
      deploy-bike-nft-local:
        condition: service_completed_successfully
      bike-nft-cam-http:
        condition: service_healthy
    user: "${LOCAL_UID:?missing_LOCAL_UID}:${LOCAL_GID:?missing_LOCAL_GID}"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 384
    mem_limit: 1g
    environment:
      HOME: /tmp/home
      npm_config_cache: /tmp/npm-cache
      npm_config_audit: "false"
      npm_config_fund: "false"
      npm_config_update_notifier: "false"
      CAM_VIEWER_BACKEND: local-rpc
      # Intentional fixture opt-in: the local demo deploy currently leaves
      # CamRoot.camHash() as bytes32(0). Non-demo viewers should set this false
      # and require a nonzero content hash.
      CAM_VIEWER_ALLOW_UNSIGNED_CAM_HASH: "true"
      CAM_VIEWER_RPC_URL: http://bike-nft-anvil:8545
      CAM_VIEWER_BROADCAST_PATH: /foundry-broadcast/DeployBikeNftLocal.s.sol/31337/run-latest.json
      CAM_VIEWER_RESOURCE_ORIGIN: "${CAM_VIEWER_RESOURCE_ORIGIN:?missing_CAM_VIEWER_RESOURCE_ORIGIN}"
      # The bike entry route takes the connected account only; route params are
      # explicit here so the backend does not invent an empty params default.
      CAM_VIEWER_INITIAL_PARAMS_JSON: "{}"
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=256m
      - /work/packages:rw,exec,nosuid,nodev,size=512m,uid=${LOCAL_UID:?missing_LOCAL_UID},gid=${LOCAL_GID:?missing_LOCAL_GID},mode=1777
    volumes:
      - ../../../packages:/input/packages:ro
      - ../../../packages/node_modules:/work/packages/node_modules:ro
      - ../../../tools:/work/tools:ro
      - bike_nft_runtime:/foundry-broadcast:ro
    networks:
      - bike_nft_local
    stdin_open: true
    tty: true
    command:
      - "run-package-workspace"
      - "sh"
      - "-eu"
      - "-c"
      - |
        npm run build:packages
        cd /work
        node --experimental-strip-types tools/viewer-terminal/terminal-session.ts

volumes:
  bike_nft_runtime:
