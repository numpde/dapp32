# Local bike NFT viewer terminal scenario.
#
# Terminal-viewer overlay for the reusable bike NFT local deployment fixture.
#
# Compose this file with deploy.yml and http.yml when the deployed fixture
# should be driven through the headless viewer terminal. Keeping this as an
# overlay lets deployment and CAM resource serving stay reusable for other
# consumers, such as a future web viewer or smoke-test lane.
#
# The base deploy fixture writes Forge broadcast output into a scenario-scoped
# Docker volume. The terminal reads that receipt read-only to discover CamRoot
# and the deployed dapp contract addresses. The separate HTTP overlay serves
# the CAM resources the terminal loads.

services:
  bike-nft-viewer-terminal:
    extends:
      file: ../../fragments/node-workspace.yml
      service: hardened-node-workspace
    working_dir: /work
    depends_on:
      deploy-bike-nft-local:
        condition: service_completed_successfully
      bike-nft-cam-http:
        condition: service_healthy
    environment:
      CAM_VIEWER_BACKEND: local-rpc
      # Intentional fixture opt-in: the local demo deploy currently leaves
      # CamRoot.camHash() as bytes32(0). Non-demo viewers should set this false
      # and require a nonzero content hash.
      CAM_VIEWER_ALLOW_UNSIGNED_CAM_HASH: "true"
      CAM_VIEWER_RPC_URL: http://bike-nft-anvil:8545
      CAM_VIEWER_BROADCAST_PATH: "${BIKE_NFT_BROADCAST_PATH:?missing_BIKE_NFT_BROADCAST_PATH}"
      CAM_VIEWER_RESOURCE_ORIGIN: "${CAM_VIEWER_RESOURCE_ORIGIN:?missing_CAM_VIEWER_RESOURCE_ORIGIN}"
      # The bike entry route takes the connected account only. Keep route inputs
      # explicit so the backend never invents an empty input default.
      CAM_VIEWER_INITIAL_INPUTS_JSON: "{}"
    volumes:
      - ../../../js:/input/js:ro
      - ../../../js/node_modules:/work/js/node_modules:ro
      - "bike_nft_broadcast:${BIKE_NFT_BROADCAST_DIR:?missing_BIKE_NFT_BROADCAST_DIR}:ro"
    networks:
      - bike_nft_local
    stdin_open: true
    tty: true
    command:
      - "run-js-workspace"
      - "sh"
      - "-eu"
      - "-c"
      - |
        npm run build:workspace
        ./node_modules/.bin/tsc -p tools/viewer-terminal/tsconfig.json
        node --experimental-strip-types tools/viewer-terminal/terminal-session.ts
